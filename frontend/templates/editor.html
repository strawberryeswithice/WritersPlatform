<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расширенный редактор</title>
  <link rel="stylesheet" href="/static/css/style_editor.css"></head>
<body>
<div class="editor-container">
  <div class="toolbar">
    <div class="title-area">
      <span class="title-label">Название</span>
      <input type="text" class="title-input" id="docTitle" value="">
    </div>
    <div class="action-buttons">
      <button class="btn" id="saveBtn">Сохранить</button>
      <button class="btn" id="exportBtn">Экспорт</button>
    </div>
  </div>

  <div class="format-panel">
    <div class="format-group">
      <button class="format-btn" id="boldBtn" title="Жирный"><b>B</b></button>
      <button class="format-btn" id="italicBtn" title="Курсив"><i>I</i></button>
      <span class="separator"></span>
      <select class="font-size-select" id="fontSizeSelect">
        <option value="3">Размер</option>
        <option value="1">мелкий</option>
        <option value="3" selected>обычный</option>
        <option value="5">крупный</option>
        <option value="7">очень крупный</option>
      </select>
    </div>
    <div class="format-group">
      <button class="format-btn" id="alignLeftBtn" title="Выровнять влево">⟽</button>
      <button class="format-btn" id="alignCenterBtn" title="По центру">≣</button>
      <button class="format-btn" id="alignRightBtn" title="Вправо">⟾</button>
    </div>
    <div class="format-group">
      <button class="format-btn" id="blockquoteBtn" title="Цитата">❝</button>
    </div>
  </div>

  <div class="main-panel">
    <div class="editor-pane">
      <div class="counter-row">
        <div class="counter-item">слов <span class="counter-value" id="wordCount">0</span></div>
        <div class="counter-item">символов <span class="counter-value" id="charCount">0</span></div>
      </div>
      <div class="story-editor" id="storyEditor" contenteditable="true"></div>
    </div>

    <div class="ai-pane">
      <div class="ai-header">
        <span>AI советник</span>
        <button class="btn-analyze" id="analyzeBtn">Анализировать текст</button>
      </div>
      <div class="ai-response-box" id="aiResponse">
        <div class="placeholder-ai">
          Нажми «Анализировать текст»
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/editor_script.js"></script>
</body>
</html>
